<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenFusion Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --muted: #7b7f8e;
    --accent: #5b8def;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 4px; }
  h2 { font-size: 1.1rem; font-weight: 500; margin-bottom: 16px; color: var(--muted); }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .card h3 {
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card .value { font-size: 1.75rem; font-weight: 700; }
  .card .sub { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }
  .card .green { color: var(--green); }
  .card .red { color: var(--red); }
  .card .yellow { color: var(--yellow); }
  .card .accent { color: var(--accent); }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }
  th {
    text-align: left;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-weight: 500;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(42,45,58,0.5);
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.7rem;
    font-weight: 500;
  }
  .badge-ok { background: rgba(52,211,153,0.15); color: var(--green); }
  .badge-warn { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .badge-err { background: rgba(248,113,113,0.15); color: var(--red); }
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
  }
  .error-state {
    text-align: center;
    padding: 60px;
    color: var(--red);
  }
  .refresh-btn {
    float: right;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .refresh-btn:hover { background: var(--border); }
  .last-updated { font-size: 0.75rem; color: var(--muted); float: right; margin-right: 12px; line-height: 32px; }
</style>
</head>
<body>

<h1>⚡ OpenFusion Dashboard</h1>
<p class="subtitle">Multi-Model Fusion Engine · <span id="uptime-display">—</span></p>

<div style="display:flex; align-items:center; gap:12px; margin-bottom:24px;">
  <button class="refresh-btn" onclick="fetchData()">⟳ Refresh</button>
  <span class="last-updated" id="last-updated"></span>
</div>

<div class="grid" id="summary-cards">
  <div class="card"><h3>Total Requests</h3><div class="value accent" id="total-requests">—</div></div>
  <div class="card"><h3>Success Rate</h3><div class="value green" id="success-rate">—</div><div class="sub" id="success-detail"></div></div>
  <div class="card"><h3>Total Cost</h3><div class="value yellow" id="total-cost">—</div><div class="sub" id="cost-detail"></div></div>
  <div class="card"><h3>Total Tokens</h3><div class="value accent" id="total-tokens">—</div></div>
</div>

<div class="card" style="margin-bottom:24px;">
  <h3>Presets</h3>
  <div id="presets-table"><div class="loading">Loading...</div></div>
</div>

<div class="grid" id="preset-cards"></div>

<script>
let lastData = null;

function fmt(n) {
  if (n === undefined || n === null) return '—';
  if (typeof n === 'number') {
    if (n >= 1000000) return (n/1000000).toFixed(2) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return n.toLocaleString();
  }
  return n;
}

function fmtCost(c) {
  if (c === undefined || c === null) return '—';
  return '$' + c.toFixed(4);
}

function fmtPct(a, b) {
  if (!b || b === 0) return '—';
  return (a / b * 100).toFixed(1) + '%';
}

function fmtDuration(ms) {
  if (!ms) return '—';
  if (ms < 1000) return ms.toFixed(0) + 'ms';
  return (ms / 1000).toFixed(2) + 's';
}

function statusBadge(r, s, f) {
  const total = s + f;
  if (total === 0) return '<span class="badge badge-ok">Idle</span>';
  const rate = s / total;
  if (rate > 0.95) return '<span class="badge badge-ok">' + fmtPct(s, total) + '</span>';
  if (rate > 0.8) return '<span class="badge badge-warn">' + fmtPct(s, total) + '</span>';
  return '<span class="badge badge-err">' + fmtPct(s, total) + '</span>';
}

async function fetchData() {
  try {
    const resp = await fetch('/v1/metrics');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    lastData = data;
    render(data);
    document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    document.getElementById('summary-cards').innerHTML =
      '<div class="error-state">⚠ Failed to load metrics: ' + e.message + '</div>';
  }
}

function render(data) {
  // Uptime
  const uptime = data.uptime_seconds || 0;
  const uptimeStr = uptime < 60 ? uptime + 's' :
    uptime < 3600 ? (uptime/60).toFixed(0) + 'm' :
    (uptime/3600).toFixed(1) + 'h';
  document.getElementById('uptime-display').textContent = 'Up ' + uptimeStr;

  // Summary
  document.getElementById('total-requests').textContent = fmt(data.total_requests);
  const success = data.total_success || 0;
  const failed = data.total_failed || 0;
  const total = success + failed;
  document.getElementById('success-rate').textContent = total > 0 ? fmtPct(success, total) : '—';
  document.getElementById('success-detail').textContent = fmt(success) + ' ok · ' + fmt(failed) + ' failed';
  document.getElementById('total-cost').textContent = fmtCost(data.total_cost_usd);
  document.getElementById('cost-detail').textContent = '$' + (data.total_panel_cost || 0).toFixed(4) + ' panel · $' + (data.total_judge_cost || 0).toFixed(4) + ' judge';
  document.getElementById('total-tokens').textContent = fmt(data.total_tokens);

  // Presets table
  const presets = data.presets || {};
  const names = Object.keys(presets).sort();

  let tableHtml = '';
  if (names.length === 0) {
    tableHtml = '<div style="text-align:center;padding:20px;color:var(--muted);">No requests yet</div>';
  } else {
    tableHtml = `<table>
      <thead><tr>
        <th>Preset</th><th>Requests</th><th>Status</th><th>Cost</th><th>Tokens</th><th>P50</th><th>P90</th><th>P99</th>
      </tr></thead><tbody>`;
    for (const name of names) {
      const p = presets[name];
      const s = p.success || 0;
      const f = p.failed || 0;
      tableHtml += `<tr>
        <td><strong>${name}</strong></td>
        <td>${fmt(p.requests)}</td>
        <td>${statusBadge(name, s, f)}</td>
        <td>${fmtCost(p.total_cost_usd)}</td>
        <td>${fmt(p.total_tokens)}</td>
        <td>${fmtDuration(p.p50_ms)}</td>
        <td>${fmtDuration(p.p90_ms)}</td>
        <td>${fmtDuration(p.p99_ms)}</td>
      </tr>`;
    }
    tableHtml += '</tbody></table>';
  }
  document.getElementById('presets-table').innerHTML = tableHtml;

  // Per-preset model breakdown cards
  let cardsHtml = '';
  for (const name of names) {
    const p = presets[name];
    const models = p.models || {};
    const modelNames = Object.keys(models);
    if (modelNames.length === 0) continue;

    let modelRows = '';
    for (const mName of modelNames) {
      const m = models[mName];
      const ms = m.success || 0;
      const mf = m.failed || 0;
      modelRows += `<tr>
        <td style="font-family:monospace;font-size:0.8rem;">${mName}</td>
        <td>${fmt(m.calls)}</td>
        <td>${statusBadge(mName, ms, mf)}</td>
        <td>${fmtDuration(m.avg_duration_ms)}</td>
      </tr>`;
    }

    cardsHtml += `<div class="card">
      <h3>${name}</h3>
      <table>
        <thead><tr><th>Model</th><th>Calls</th><th>Success</th><th>Avg</th></tr></thead>
        <tbody>${modelRows}</tbody>
      </table>
    </div>`;
  }
  document.getElementById('preset-cards').innerHTML = cardsHtml;
}

// Auto-refresh every 10s
fetchData();
setInterval(fetchData, 10000);
</script>
</body>
</html>
