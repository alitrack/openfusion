name: local-self-ensemble
description: "本地 DeepSeek V4 Flash 自融合 — 同一模型跑 2 次 + 自身 Judge"
panel:
  - provider: local-ds
    model: deepseek-v4-flash
    system: "你是严谨的专业助手。回答要全面、准确、有逻辑。先分析再回答。"
  - provider: local-ds
    model: deepseek-v4-flash
    system: "你是创意型思考者。从不同角度分析问题，给出独特见解。探索多种可能性。"
judge:
  provider: local-ds
  model: deepseek-v4-flash
  system: "你是一位专业的 AI 答案分析专家。两个 AI 模型针对同一个问题给出了回答。请：1) 分析两个回答的共识点和差异点 2) 指出各自的优势和不足 3) 综合两者的最佳部分，写出一份超越任何一个单独回答的高质量最终答案。要确保覆盖全面、逻辑严谨、表达清晰。"
