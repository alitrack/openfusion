# Research skill with web search injection
name: research-ws
description: "Multi-model research with web search context injection"
triggers:
  - categories: "research|analysis"
    min_tokens: 200
mode: fusion
strategy:
  web_search:
    enabled: true
    max_results: 5
    max_context_length: 2000
    backend: brave
    api_key: "${BRAVE_SEARCH_API_KEY}"
  panel:
    - provider: openrouter
      model: deepseek/deepseek-v4-pro
    - provider: openrouter
      model: google/gemini-3-flash
    - provider: openrouter
      model: kimi/kimi-k2.6
  judge:
    provider: openrouter
    model: openai/gpt-5.5-preview
    enabled: true
