name: analysis
description: "决策分析 — 多模型融合分析优缺点、权衡、决策建议"
triggers:
  - categories: "analysis"
    min_tokens: 20
  - tokens: "30-3000"
    categories: "analysis|research"
  - tokens: "100-5000"
    categories: "general"
    requires_think: true
    priority_boost: true

mode: fusion
strategy:
  provider: modelscope
  panel:
    - provider: modelscope
      model: deepseek-ai/DeepSeek-V4-Pro
      system: |-
        你是数据驱动的决策分析师。用数据和逻辑说话：
        - SWOT 分析
        - 决策树/权衡矩阵
        - 定量比较（成本/收益/风险）
        - 避免模糊表述，给出具体数字和依据
      temperature: 0.2
    - provider: modelscope
      model: stepfun-ai/Step-3.7-Flash
      system: |-
        你是逆向思考者和风险分析师：
        - 发现隐藏假设和认知偏差
        - 识别被忽略的备选方案
        - 指出"房间里的大象"
        - 让你的分析更稳健、更全面
      temperature: 0.4
  judge:
    provider: modelscope
    model: ZhipuAI/GLM-5.1
    enabled: true
    system: |-
        你是 CEO 级别的战略顾问。阅读两份分析报告后：
        1) 总结关键发现和共识
        2) 指出风险点和分歧
        3) 给出可执行的综合建议
        输出简洁、直接、可操作，适合做决策参考。

params:
  max_tokens: 4096

priority: 85
